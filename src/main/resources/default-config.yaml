## App branding & profile (optional)
# app:
#   name: "kafka-agent"
#   system-prompt: |
#     You are kafka-agent, a terminal-based AI assistant for Apache Kafka and Flink.

## Auto-connect to MCP servers on startup (optional)
## Each entry under 'servers' is a named MCP server connection.
## Supported types: sse (HTTP SSE), stdio (subprocess)
# mcp:
#   servers:
#     confluent:
#       type: sse
#       url: http://localhost:8080/sse
#     filesystem:
#       type: stdio
#       command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
#       env:
#         DEBUG: "true"
#
## Legacy single-server format (deprecated, still works):
# mcp:
#   auto-connect-url: http://localhost:8080/sse

## Chat model provider — "anthropic" (default) or "ollama"
provider: ollama

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  max-tokens: 4096
  cache-system-messages: true
  cache-tools: true
  thinking:
    enabled: false
    budget-tokens: 2048

## Local Ollama provider (requires `ollama serve` running locally).
## Recommended models with reliable tool calling for the kafka-agent demo:
##   qwen2.5:7b   — 4.7GB, strong tool calling, fast on M-series Macs (default)
##   llama3.1:8b  — 4.9GB, decent tool calling, well-supported
## Models WITHOUT tool support (3.x haiku-class, base llama2, codellama) will
## silently ignore tool definitions — you'll get prompt-only responses.
ollama:
  base-url: http://localhost:11434
  model: qwen2.5:7b
  # Per-request timeout. 10 minutes accommodates first-call model load,
  # agentic tool loops, and verbose contexts on smaller models. Bump higher
  # if you see "request timed out" with very large models or cold starts.
  timeout-seconds: 600
confluent:
  bootstrap-servers: ${CONFLUENT_BOOTSTRAP}
  api-key: ${CONFLUENT_API_KEY}
  api-secret: ${CONFLUENT_API_SECRET}
  flink:
    environment-id: ${FLINK_ENV_ID}
    org-id: ${CONFLUENT_ORG_ID}
